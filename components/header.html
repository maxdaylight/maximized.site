<!--
  header.html — Reference template for the shared site header + primary nav.
  This is NOT a server include. Keep this block in sync across all pages.

  Notes:
  - The skip link must be the first focusable element in <body>.
  - nav.js highlights the active link automatically (aria-current="page").
  - theme.js wires the [data-theme-toggle] button.
-->
<a class="skip-link" href="#main">Skip to content</a>

<header class="site-header">
  <div class="container site-header__inner">
    <a class="brand" href="./index.html">
      <span class="brand__mark" aria-hidden="true">&#9632;</span>
      Maximized
    </a>

    <nav id="primary-nav" class="primary-nav" aria-label="Primary">
      <ul class="primary-nav__list">
        <li><a class="primary-nav__link" href="./index.html">Home</a></li>
        <li><a class="primary-nav__link" href="./services.html">Services</a></li>
        <li><a class="primary-nav__link" href="./about.html">About</a></li>
        <li><a class="primary-nav__link" href="./work.html">Work</a></li>
        <li><a class="primary-nav__link" href="./contact.html">Contact</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      <button
        type="button"
        class="icon-btn theme-toggle"
        data-theme-toggle
        aria-label="Switch theme"
        aria-pressed="false"
      >
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>

      <button
        type="button"
        id="nav-toggle"
        class="icon-btn nav-toggle"
        aria-label="Toggle navigation menu"
        aria-controls="primary-nav"
        aria-expanded="false"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false">
          <path d="M3 6h18M3 12h18M3 18h18"></path>
        </svg>
      </button>
    </div>
  </div>
</header>
